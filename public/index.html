<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apply</title>

<style>
body{
  background:#0b1220;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

form{
  background:#020617;
  padding:30px;
  border-radius:10px;
  width:300px;
}

input,select{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  width:100%;
  padding:10px;
  background:#2563eb;
  color:white;
  border:none;
}
</style>
</head>

<body>

<form id="form">
<h2>Apply</h2>

<input name="name" placeholder="Full Name" required>
<input name="email" placeholder="Email" required>

<select name="position">
<option>Warehouse</option>
<option>Driver</option>
</select>

<input type="file" name="resume" required>

<button type="submit">Submit</button>
</form>

<script>
const form=document.getElementById("form");

form.addEventListener("submit",async(e)=>{
e.preventDefault();

const data=new FormData(form);

const message=`
New Application
Name: ${data.get("name")}
Email: ${data.get("email")}
Position: ${data.get("position")}
`;

await fetch("https://api.telegram.org/8565717097:AAGpHQVR69-cbHDYHUzB4uShs2AO_4AprfE/sendMessage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:"7130815599",
text:message
})
});

await fetch("https://formsubmit.co/katesteward34@gmail.com",{
method:"POST",
body:data
});

alert("Application Sent!");
form.reset();
});
</script>

</body>
</html>
