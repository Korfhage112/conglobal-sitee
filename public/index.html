<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConGlobal Logistics</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    /* HERO SECTION */
    .hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero-content {
      background: rgba(0,0,0,0.6);
      padding: 40px;
      border-radius: 10px;
      max-width: 700px;
    }

    /* 🔥 FIXED TEXT SIZE */
    .hero-content h1 {
      font-size: clamp(32px, 5vw, 64px);
      margin-bottom: 20px;
    }

    .hero-content p {
      font-size: clamp(16px, 2vw, 22px);
      margin-bottom: 25px;
    }

    .hero-content button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .hero-content button:hover {
      background: #16a34a;
    }

  </style>
</head>

<body>

  <section class="hero">
    <div class="hero-content">
      <h1>Join ConGlobal Logistics</h1>
      <p>Modern workforce powering global supply chains</p>
      <button>Apply Now</button>
    </div>
  </section>

</body>
</html>
