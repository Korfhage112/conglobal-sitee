<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConGlobal Logistics</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body { background:#0f172a; color:white; }

.navbar {
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(0,0,0,0.7);
}

.navbar a { color:white; text-decoration:none; margin-left:20px; }

.hero {
  height:100vh;
  background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d');
  background-size:cover;
  background-position:center;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero-content {
  background:rgba(0,0,0,0.6);
  padding:40px;
  border-radius:10px;
}

.hero-content h1 {
  font-size:clamp(36px, 6vw, 70px);
}

.hero-content p {
  margin:20px 0;
  font-size:18px;
}

button {
  padding:12px 25px;
  background:#22c55e;
  color:white;
  border:none;
}

.about {
  padding:80px 20px;
  text-align:center;
}
</style>
</head>

<body>

<div class="navbar">
  <div><strong>ConGlobal</strong></div>
  <div>
    <a href="about.html">About</a>
    <a href="apply.html">Apply</a>
  </div>
</div>

<section class="hero">
  <div class="hero-content">
    <h1>Join ConGlobal Logistics</h1>
    <p>Modern workforce powering global supply chains</p>

    <a href="apply.html">
      <button>Apply Now</button>
    </a>

  </div>
</section>

<section class="about">
  <h2>About ConGlobal Logistics</h2>
  <p>
    ConGlobal Logistics is a global supply chain company providing reliable
    cargo handling, warehousing, and distribution services worldwide.
  </p>
</section>

</body>
</html>
