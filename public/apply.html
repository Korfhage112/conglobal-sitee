<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apply - ConGlobal</title>

<style>
body{
  background:#0b1220;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#020617;
  padding:30px;
  border-radius:10px;
  width:320px;
  text-align:center;
}

input, select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:5px;
}

button{
  width:100%;
  padding:12px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<form class="container"
action="https://formsubmit.co/katesteward34@gmail.com"
method="POST"
enctype="multipart/form-data">

<h2>Apply</h2>

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>

<select name="position" required>
<option value="">Select Position</option>
<option>Driver</option>
<option>Warehouse</option>
<option>Operator</option>
</select>

<input type="file" name="attachment" required>

<!-- IMPORTANT SETTINGS -->
<input type="hidden" name="_subject" value="New Application">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://conglobal-app.onrender.com/success.html">

<button type="submit">Submit Application</button>

</form>

</body>
</html>
