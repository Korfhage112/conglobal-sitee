<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apply - ConGlobal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }

    body {
      height:100vh;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d');
      background-size: cover;
      background-position: center;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .container {
      background: rgba(0,0,0,0.75);
      padding: 40px;
      border-radius: 15px;
      width: 350px;
      text-align:center;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity:0; transform: translateY(20px); }
      to { opacity:1; transform: translateY(0); }
    }

    .logo {
      width:120px;
      margin-bottom:15px;
    }

    input, select {
      width:100%;
      padding:12px;
      margin:10px 0;
      border-radius:8px;
      border:none;
      font-size:14px;
    }

    .upload-btn {
      display:inline-block;
      width:100%;
      padding:12px;
      background-color:#22c55e;
      color:white;
      border-radius:8px;
      cursor:pointer;
      margin-top:10px;
      font-weight:500;
    }

    .upload-btn:hover { background-color:#16a34a; }

    button {
      width:100%;
      padding:12px;
      background:#22c55e;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      margin-top:15px;
      font-weight:bold;
      font-size:16px;
    }

    button:hover { background:#16a34a; }

    small { display:block; margin-top:5px; color:#ccc; font-size:12px; }
  </style>
</head>

<body>

  <form class="container" 
        action="/apply" 
        method="POST" 
        enctype="multipart/form-data">

    <img src="logo.png" class="logo" alt="logo">

    <h2>Apply for a Position</h2>

    <input type="text" name="name" placeholder="Full Name" required>

    <input type="email" name="email" placeholder="Email Address" required>

    <input type="tel" name="phone" placeholder="(123) 456-7890" required>

    <select name="position" required>
      <option value="">Select Position</option>
      <option>Equipment Operator</option>
      <option>Warehouse Associate</option>
      <option>Truck Driver</option>
    </select>

    <input type="file" id="resume" name="resume" hidden required>
    <label for="resume" class="upload-btn">+ Add Application (Resume)</label>

    <small>Accepted formats: PDF, DOC, DOCX</small>

    <button type="submit">Submit Application</button>

  </form>

</body>
</html>
