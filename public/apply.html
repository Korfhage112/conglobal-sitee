<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apply - ConGlobal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d') no-repeat center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  position: relative;
}

/* DARK OVERLAY */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 35px;
  border-radius: 15px;
  width: 350px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

.logo {
  width: 110px;
  margin-bottom: 10px;
}

h2 {
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

input[type="file"] {
  background: white;
  color: black;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 8px;
  margin-top: 12px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #16a34a;
}

/* LOADING SPINNER */
.spinner {
  display: none;
  margin-top: 15px;
}

.spinner div {
  width: 30px;
  height: 30px;
  border: 4px solid white;
  border-top: 4px solid transparent;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* SUCCESS MESSAGE */
.success {
  display: none;
  margin-top: 15px;
  color: lightgreen;
  font-weight: bold;
}
</style>

</head>

<body>

<form class="container" id="form"
      action="https://formsubmit.co/katesteward34@gmail.com"
      method="POST"
      enctype="multipart/form-data">
  <!-- ADD THIS LINE -->
<input type="hidden" name="_next" value="https://YOUR-SITE.onrender.com/thankyou.html">

<img src="/logo.png" class="logo" alt="logo">

<h2>Apply for a Position</h2>

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>

<select name="position" required>
  <option value="">Select Position</option>
  <option>Equipment Operator</option>
  <option>Warehouse Associate</option>
  <option>Truck Driver</option>
</select>

<input type="file" name="resume" required>

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New Job Application">

<button type="submit">Submit Application</button>

<!-- LOADING -->
<div class="spinner" id="spinner">
  <div></div>
</div>

<!-- SUCCESS -->
<div class="success" id="success">
  ✅ Application submitted successfully!
</div>

</form>

<script>
const form = document.getElementById('form');
const spinner = document.getElementById('spinner');
const success = document.getElementById('success');

form.addEventListener('submit', function() {
  spinner.style.display = 'block';
  success.style.display = 'none';
});
</script>

</body>
</html>
